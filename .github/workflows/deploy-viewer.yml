# Builds the web STEP viewer and publishes web/dist to GitHub Pages.
# Relative asset base (vite.config.ts `base: "./"`) means the same bundle works at the
# github.io project path, at an apex custom domain, or dropped under cnckitchen.com/stepview.
name: Deploy STEP viewer

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - ".github/workflows/deploy-viewer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer push cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
